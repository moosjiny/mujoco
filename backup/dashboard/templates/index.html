<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenArm Monitoring Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(20, 26, 35, 0.7);
            --accent-blue: #00d2ff;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        .status-badge {
            background: rgba(0, 210, 255, 0.2);
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        canvas {
            width: 100% !important;
            height: 140px !important;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .metric-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 10px;
        }

        .metric-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        h1 { font-size: 1.5rem; margin: 0; color: var(--accent-blue); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>ROBOTICS</h1>
        <div class="card">
            <div class="card-title">Live Status <span class="status-badge">OPERATIONAL</span></div>
            <div class="metric-grid">
                <div class="metric-item">
                    <div class="metric-label">Active Tasks</div>
                    <div class="metric-value">Assembly</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Efficiency</div>
                    <div class="metric-value">98.2%</div>
                </div>
            </div>
        </div>
        <div class="card" style="flex: 1;">
            <div class="card-title">Alerts & Logs</div>
            <div style="font-size: 0.8rem; color: var(--text-dim);">
                [10:26:45] CAN bus initialized.<br>
                [10:26:46] Arm calibration complete.<br>
                [10:26:50] Teleop started.
            </div>
        </div>
    </div>

    <div class="main-content">
        <!-- 3D Visualization -->
        <div class="card" style="grid-row: span 2; position: relative; padding: 0; overflow: hidden;">
            <div class="card-title" style="position: absolute; top: 20px; left: 20px; z-index: 10;">OpenArm Digital Twin</div>
            <iframe src="http://127.0.0.1:9090/?url=rerun%2Bhttp%3A%2F%2F127.0.0.1%3A9876%2Fproxy" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>

        <!-- Torque Monitoring -->
        <div class="card">
            <div class="card-title">Motor Torque (Nm)</div>
            <canvas id="torqueChart"></canvas>
        </div>

        <!-- Position Monitoring -->
        <div class="card">
            <div class="card-title">Joint Positions (deg)</div>
            <canvas id="posChart"></canvas>
        </div>
    </div>

    <script>
        const ctxTorque = document.getElementById('torqueChart').getContext('2d');
        const ctxPos = document.getElementById('posChart').getContext('2d');

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a0a0a0' } },
                x: { grid: { display: false }, ticks: { display: false } }
            },
            plugins: { legend: { display: false } },
            elements: { line: { tension: 0.4 }, point: { radius: 0 } }
        };

        const torqueChart = new Chart(ctxTorque, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [
                { label: 'Arm A', borderColor: '#00d2ff', data: Array(30).fill(0), borderWidth: 2 },
                { label: 'Arm B', borderColor: '#ffffff', data: Array(30).fill(0), borderWidth: 1 }
            ]},
            options: commonOptions
        });

        const posChart = new Chart(ctxPos, {
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [
                { label: 'Joint 1', borderColor: '#00d2ff', data: Array(30).fill(0), borderWidth: 2 },
                { label: 'Joint 2', borderColor: '#ffffff', data: Array(30).fill(0), borderWidth: 1 }
            ]},
            options: commonOptions
        });

        const socket = new WebSocket(`ws://${window.location.host}/ws`);
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // Update Torque Chart
            torqueChart.data.datasets[0].data.push(data.left.torque[0]);
            torqueChart.data.datasets[0].data.shift();
            torqueChart.data.datasets[1].data.push(data.right.torque[0]);
            torqueChart.data.datasets[1].data.shift();
            torqueChart.update('none');

            // Update Position Chart
            posChart.data.datasets[0].data.push(data.left.joints[0] * 57.29); // rad to deg
            posChart.data.datasets[0].data.shift();
            posChart.update('none');
        };
    </script>
</body>
</html>
